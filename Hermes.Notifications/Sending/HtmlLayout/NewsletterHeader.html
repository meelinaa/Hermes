<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hermes Newsletter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4;">

    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding: 40px 0;">
        <tr>
            <td align="center">

                <!-- Container -->
                <table width="620" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">

                    <!-- Header — Georgia bleibt für den Titel -->
                    <tr>
                        <td style="background-color:#1a1a2e; padding: 32px 40px; text-align:center;">
                            <h1 style="margin:0; font-family:'Georgia', serif; color:#c9a84c; font-size:28px; letter-spacing:4px; text-transform:uppercase;">{{HEADER}}</h1>
                            <p style="margin:6px 0 0; font-family:'Noto Sans', sans-serif; color:#888; font-size:11px; letter-spacing:2px; text-transform:uppercase; font-weight:400;">{{HEADER2}}</p>
                        </td>
                    </tr>

                    <!-- Date bar -->
                    <tr>
                        <td style="background-color:#f9f3e3; padding: 10px 40px; border-bottom: 1px solid #e8dfc8;">
                            <p style="margin:0; font-family:'Noto Sans', sans-serif; font-size:11px; color:#999; letter-spacing:1px; font-weight:600; text-transform:uppercase;">{{DATE}}</p>
                        </td>
                    </tr>

                    <!-- Intro -->
                    <tr>
                        <td style="padding: 32px 40px 16px;">
                            <p style="margin:0; font-family:'Noto Sans', sans-serif; font-size:15px; color:#444; line-height:1.8; font-weight:400;">
                                {{INTRO}}
                            </p>
                        </td>
                    </tr>
